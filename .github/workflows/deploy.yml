name: Deploy to Google Cloud Run

on:
  push:
    branches:
      - main

env:
  SERVICE_NAME: selfstudy
  REGION: asia-northeast3

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        run: |
          ENV_VARS=""
          if [ -n "${{ secrets.GEMINI_API_KEY }}" ]; then ENV_VARS="GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}"; fi
          if [ -n "${{ secrets.GEMINI_MODEL }}" ]; then ENV_VARS="${ENV_VARS:+${ENV_VARS},}GEMINI_MODEL=${{ secrets.GEMINI_MODEL }}"; fi
          if [ -n "${{ secrets.OPENAI_API_KEY }}" ]; then ENV_VARS="${ENV_VARS:+${ENV_VARS},}OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}"; fi
          if [ -n "${{ secrets.DATABASE_URL }}" ]; then ENV_VARS="${ENV_VARS:+${ENV_VARS},}DATABASE_URL=${{ secrets.DATABASE_URL }}"; fi

          PROJECT_FLAG=""
          if [ -n "${{ secrets.GCP_PROJECT_ID }}" ]; then PROJECT_FLAG="--project=${{ secrets.GCP_PROJECT_ID }}"; fi

          if [ -n "$ENV_VARS" ]; then
            gcloud run deploy ${{ env.SERVICE_NAME }} \
              $PROJECT_FLAG \
              --source . \
              --region ${{ env.REGION }} \
              --allow-unauthenticated \
              --set-env-vars "$ENV_VARS"
          else
            gcloud run deploy ${{ env.SERVICE_NAME }} \
              $PROJECT_FLAG \
              --source . \
              --region ${{ env.REGION }} \
              --allow-unauthenticated
          fi
